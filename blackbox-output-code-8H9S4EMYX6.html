<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Novel World | Exploring the Beauty of Literature</title>
    <meta name="description" content="A comprehensive guide to different kinds of novels, their beauty, and the impact of literature on our lives.">
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary-color: #5D4037; /* Dark Brown */
            --secondary-color: #F5F5DC; /* Beige */
            --accent-color: #8B0000; /* Dark Red */
            --text-color: #3E2723;
            --bg-color: #FFF8E7; /* Light Cream */
            --overlay-bg: rgba(62, 39, 35, 0.9);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
            --border-color: #D7CCC8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            scroll-behavior: smooth;
        }

        /* --- HEADER & NAV --- */
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #3E2723 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            padding: 1.5rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--secondary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--secondary-color);
            font-weight: 600;
            transition: color 0.3s;
            font-size: 1.1rem;
        }

        nav a:hover {
            color: #FFD700;
        }

        /* --- HERO SECTION --- */
        .hero {
            background: linear-gradient(rgba(93, 64, 55, 0.85), rgba(62, 39, 35, 0.85)), 
                        url('https://images.unsplash.com/photo-1512820790803-83ca734da794?w=1200') center/cover;
            padding: 6rem 5%;
            text-align: center;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--secondary-color);
        }

        .hero h1 {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.6rem;
            max-width: 900px;
            margin-bottom: 3rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            font-style: italic;
        }

        .btn {
            background-color: var(--secondary-color);
            color: var(--primary-color);
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            border: 2px solid var(--secondary-color);
            font-size: 1.1rem;
        }

        .btn:hover {
            background-color: transparent;
            color: var(--secondary-color);
            transform: translateY(-3px);
        }

        /* --- DISCLAIMER --- */
        .disclaimer {
            background-color: #FFD700;
            color: #5D4037;
            padding: 1rem;
            text-align: center;
            font-size: 0.95rem;
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* --- CONTENT SECTIONS --- */
        .container {
            padding: 5rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 3.2rem;
            color: var(--primary-color);
            margin-bottom: 4rem;
            position: relative;
            font-family: 'Georgia', serif;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 120px;
            height: 6px;
            background-color: var(--accent-color);
            margin: 15px auto 0;
            border-radius: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
        }

        .card {
            background: var(--bg-color);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            text-align: left;
            transition: transform 0.3s;
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .card h3 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            font-size: 2rem;
            font-family: 'Georgia', serif;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .card p {
            margin-bottom: 1.5rem;
            color: #5D4037;
            font-size: 1.1rem;
            text-align: justify;
        }

        .card a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: border 0.3s;
        }

        .card a:hover {
            border-bottom: 2px solid var(--accent-color);
        }

        /* --- IMAGE PLACEHOLDERS --- */
        .book-image {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* --- BEAUTY SECTION --- */
        .beauty-section {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--bg-color) 100%);
            padding: 5rem 5%;
        }

        .beauty-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .beauty-text h2 {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-family: 'Georgia', serif;
        }

        .beauty-text ul {
            list-style-position: inside;
            margin-top: 1.5rem;
        }

        .beauty-text li {
            margin-bottom: 1rem;
            font-size: 1.15rem;
        }

        /* --- GENRES SECTION --- */
        .genres-section {
            background-color: var(--bg-color);
            padding: 5rem 5%;
        }

        .genre-card {
            background: var(--bg-color);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            text-align: center;
            border: 2px solid var(--border-color);
            transition: all 0.3s;
        }

        .genre-card:hover {
            transform: scale(1.02);
            border-color: var(--primary-color);
        }

        .genre-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }

        /* --- QUOTE SECTION --- */
        .quote-section {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 5rem 5%;
            text-align: center;
            color: var(--secondary-color);
        }

        .quote {
            font-size: 2.2rem;
            font-style: italic;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.6;
            font-family: 'Georgia', serif;
        }

        .quote-author {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }
